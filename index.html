<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Dijital Saat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="clock">

    <div class="time-group">
      <div class="digit" id="h1">0</div>
      <div class="digit" id="h2">0</div>
    </div>

    <div class="colon">
      <span></span>
      <span></span>
    </div>

    <div class="time-group">
      <div class="digit" id="m1">0</div>
      <div class="digit" id="m2">0</div>
    </div>

    <div class="colon">
      <span></span>
      <span></span>
    </div>

    <div class="time-group">
      <div class="digit" id="s1">0</div>
      <div class="digit" id="s2">0</div>
    </div>

  </div>

  <div class="day" id="day">Pazartesi</div>

</div>

<script src="main.js"></script>
</body>
</html>
